<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sub-Plot Designer — The Green Wizard</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;1,400&family=DM+Sans:wght@400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    /* British Racing Green palette */
    --brg-void:    #060f0a;
    --brg-deep:    #0a1e12;
    --brg-panel:   #0d2818;
    --brg-border:  #1a4a2a;
    --brg-mid:     #2d7a4e;
    --brg-bright:  #4a9e68;
    --brg-leaf:    #7ab648;
    --chalk:       #e8f0e4;
    --chalk-dim:   #a8c4b0;
    --stone:       #6a9478;
    --danger:      #c0392b;
    --straw:       #c8a95a;
    --petal:       #d48090;
    --sky:         #6090b8;

    --font-display: 'Playfair Display', Georgia, serif;
    --font-ui:      'DM Sans', system-ui, sans-serif;
    --font-mono:    'DM Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-mono);
    background: var(--brg-void);
    color: var(--chalk);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 20px;
    height: 52px;
    background: var(--brg-panel);
    border-bottom: 1px solid var(--brg-border);
    flex-shrink: 0;
  }

  .brand {
    font-family: var(--font-display);
    font-size: 1rem;
    font-weight: 500;
    color: var(--brg-leaf);
    letter-spacing: 0.01em;
    white-space: nowrap;
  }
  .brand em {
    font-style: italic;
    color: var(--chalk-dim);
    font-size: 0.8rem;
    margin-left: 6px;
  }

  .back-link {
    color: var(--stone);
    font-size: 0.72rem;
    text-decoration: none;
    font-family: var(--font-ui);
    transition: color 0.12s;
    margin-right: 4px;
  }
  .back-link:hover { color: var(--chalk); }

  .mode-pills {
    display: flex;
    gap: 6px;
    margin-left: auto;
  }

  .pill {
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid var(--brg-border);
    background: transparent;
    color: var(--chalk-dim);
    font-family: var(--font-mono);
    font-size: 0.72rem;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.04em;
    white-space: nowrap;
  }
  .pill:hover { background: var(--brg-border); color: var(--chalk); }
  .pill.active { background: var(--brg-mid); border-color: var(--brg-mid); color: var(--chalk); font-weight: 500; }
  .pill.danger { border-color: var(--danger); color: var(--danger); }
  .pill.danger:hover { background: var(--danger); color: white; }

  /* ── Workspace ── */
  .workspace {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Left panel — object library ── */
  .left-panel {
    width: 176px;
    flex-shrink: 0;
    background: var(--brg-panel);
    border-right: 1px solid var(--brg-border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .panel-title {
    padding: 10px 14px;
    font-size: 0.6rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--stone);
    border-bottom: 1px solid var(--brg-border);
    font-family: var(--font-ui);
    flex-shrink: 0;
  }

  .object-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .object-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 10px;
    border-radius: 6px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.12s;
  }
  .object-item:hover { background: rgba(255,255,255,0.04); border-color: var(--brg-border); }
  .object-item.selected { background: rgba(45,122,78,0.25); border-color: var(--brg-mid); }

  .object-label {
    font-size: 0.72rem;
    line-height: 1.3;
    color: var(--chalk);
    font-family: var(--font-ui);
  }

  /* ── Canvas area ── */
  .canvas-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: var(--brg-deep);
    background-image:
      radial-gradient(circle at 15% 85%, rgba(45,122,78,0.07) 0%, transparent 50%),
      radial-gradient(circle at 85% 15%, rgba(45,122,78,0.05) 0%, transparent 40%);
  }

  canvas {
    position: absolute;
    top: 0; left: 0;
    cursor: crosshair;
    touch-action: none;
  }
  canvas.mode-select { cursor: default; }

  .canvas-hint {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(13,40,24,0.9);
    border: 1px solid var(--brg-border);
    padding: 6px 18px;
    border-radius: 20px;
    font-size: 0.68rem;
    color: var(--stone);
    letter-spacing: 0.04em;
    pointer-events: none;
    white-space: nowrap;
    font-family: var(--font-ui);
  }

  /* ── Right panel — subplot list ── */
  .right-panel {
    width: 216px;
    flex-shrink: 0;
    background: var(--brg-panel);
    border-left: 1px solid var(--brg-border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .subplot-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .subplot-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border-radius: 6px;
    border: 1px solid transparent;
    cursor: pointer;
    transition: all 0.12s;
  }
  .subplot-item:hover { background: rgba(255,255,255,0.04); border-color: var(--brg-border); }
  .subplot-item.active { background: rgba(45,122,78,0.2); border-color: var(--brg-mid); }

  .subplot-color-dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .subplot-info { flex: 1; min-width: 0; }

  .subplot-name {
    font-size: 0.72rem;
    color: var(--chalk);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-family: var(--font-ui);
  }

  .subplot-meta {
    font-size: 0.6rem;
    color: var(--stone);
    margin-top: 1px;
    font-family: var(--font-ui);
  }

  .subplot-actions {
    display: flex;
    gap: 3px;
    opacity: 0;
    transition: opacity 0.12s;
  }
  .subplot-item:hover .subplot-actions { opacity: 1; }

  .icon-btn {
    width: 20px;
    height: 20px;
    border-radius: 3px;
    border: none;
    background: rgba(255,255,255,0.07);
    color: var(--stone);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    transition: all 0.12s;
    padding: 0;
    line-height: 1;
  }
  .icon-btn:hover { background: var(--danger); color: white; }
  .icon-btn.up:hover, .icon-btn.dn:hover { background: var(--brg-mid); color: white; }

  .z-badge {
    font-size: 0.55rem;
    background: rgba(255,255,255,0.07);
    padding: 1px 5px;
    border-radius: 3px;
    color: var(--stone);
    flex-shrink: 0;
  }

  .empty-state {
    padding: 24px 14px;
    text-align: center;
    color: var(--stone);
    font-size: 0.68rem;
    line-height: 1.8;
    font-family: var(--font-ui);
  }

  /* ── Fill controls ── */
  .fill-controls {
    padding: 12px 14px;
    border-top: 1px solid var(--brg-border);
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex-shrink: 0;
  }

  .fill-label {
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--stone);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: var(--font-ui);
  }
  .fill-label span { color: var(--chalk-dim); font-size: 0.68rem; letter-spacing: 0; }

  .fill-controls input[type=range] {
    width: 100%;
    margin-top: 3px;
    accent-color: var(--brg-leaf);
  }

  .fill-btn {
    width: 100%;
    padding: 9px;
    background: var(--brg-mid);
    border: none;
    border-radius: 6px;
    color: var(--chalk);
    font-family: var(--font-ui);
    font-size: 0.72rem;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
  }
  .fill-btn:hover { background: var(--brg-bright); }
  .fill-btn:disabled { opacity: 0.3; cursor: not-allowed; background: var(--brg-border); }

  /* ── Name modal ── */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-backdrop.visible { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--brg-panel);
    border: 1px solid var(--brg-mid);
    border-radius: 10px;
    padding: 24px;
    width: 290px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .modal h2 {
    font-family: var(--font-display);
    font-size: 1rem;
    color: var(--brg-leaf);
    font-weight: 500;
  }

  .modal input[type=text] {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--brg-border);
    border-radius: 6px;
    padding: 9px 12px;
    color: var(--chalk);
    font-family: var(--font-ui);
    font-size: 0.82rem;
    outline: none;
    transition: border-color 0.12s;
  }
  .modal input[type=text]:focus { border-color: var(--brg-mid); }
  .modal input[type=text]::placeholder { color: var(--stone); }

  .modal-row { display: flex; gap: 8px; }
  .modal-btn {
    flex: 1;
    padding: 9px;
    border-radius: 6px;
    border: 1px solid var(--brg-border);
    background: transparent;
    color: var(--chalk-dim);
    font-family: var(--font-ui);
    font-size: 0.75rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  .modal-btn:hover:not(.primary) { background: rgba(255,255,255,0.07); }
  .modal-btn.primary { background: var(--brg-mid); border-color: var(--brg-mid); color: var(--chalk); font-weight: 500; }
  .modal-btn.primary:hover { background: var(--brg-bright); border-color: var(--brg-bright); }

  /* ── Mobile drawers ── */
  .mob-fab {
    display: none;
    position: fixed; bottom: 20px; z-index: 310;
    width: 52px; height: 52px; border-radius: 50%;
    background: var(--brg-mid); color: white; border: none;
    font-size: 1.4rem; cursor: pointer;
    align-items: center; justify-content: center;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  }
  .mob-fab-left  { left: 16px; }
  .mob-fab-right { right: 16px; }

  .drawer-backdrop {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.55); z-index: 299;
  }
  .drawer-backdrop.open { display: block; }

  .panel-close-btn {
    display: none; margin-left: auto; background: none; border: none;
    font-size: 1rem; color: var(--stone); cursor: pointer; padding: 4px 8px;
  }
  .panel-close-btn:hover { color: var(--chalk); }

  @media (max-width: 700px) {
    .left-panel {
      position: fixed; top: 0; left: 0; height: 100%; width: 85vw; max-width: 300px;
      z-index: 300; transform: translateX(-110%); transition: transform 0.25s ease;
    }
    .left-panel.drawer-open { transform: translateX(0); }
    .right-panel {
      position: fixed; top: 0; right: 0; height: 100%; width: 85vw; max-width: 300px;
      z-index: 300; transform: translateX(110%); transition: transform 0.25s ease;
    }
    .right-panel.drawer-open { transform: translateX(0); }
    .panel-close-btn { display: block; }
    .mob-fab { display: flex; }
    .mode-pills .pill em { display: none; }
  }
</style>
</head>
<body>

<header>
  <a href="../../app.html" class="back-link">← Canvas</a>
  <div class="brand">🌿 The Green Wizard <em>Sub-Plot Designer</em></div>
  <div class="mode-pills">
    <button class="pill active" id="btn-draw" onclick="setMode('draw')">✏ Draw</button>
    <button class="pill" id="btn-select" onclick="setMode('select')">↖ Select</button>
    <button class="pill danger" id="btn-clear" onclick="clearAll()">✕ Clear</button>
  </div>
</header>

<div class="workspace">

  <!-- Left: object library -->
  <div class="left-panel" id="leftPanel">
    <div class="panel-title" style="display:flex;align-items:center">
      Garden Objects
      <button class="panel-close-btn" onclick="closeDrawer()">✕</button>
    </div>
    <div class="object-list" id="objectList"></div>
  </div>

  <!-- Centre: canvas -->
  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="mainCanvas"></canvas>
    <div class="canvas-hint" id="hint">Click to place vertices — double-click or click start point to close</div>
  </div>

  <!-- Right: subplot list -->
  <div class="right-panel" id="rightPanel">
    <div class="panel-title" style="display:flex;align-items:center">
      Sub-Plots
      <button class="panel-close-btn" onclick="closeDrawer()">✕</button>
    </div>
    <div class="subplot-list" id="subplotList">
      <div class="empty-state">Draw a zone on the canvas to create your first sub-plot.</div>
    </div>
    <div class="fill-controls">
      <label class="fill-label">Tile size <span id="tileSizeVal">48px</span></label>
      <input type="range" id="tileSize" min="24" max="96" value="48" oninput="updateTileVal()">
      <label class="fill-label">Randomness <span id="randVal">40%</span></label>
      <input type="range" id="randAmount" min="0" max="100" value="40" oninput="updateRandVal()">
      <button class="fill-btn" id="fillBtn" onclick="fillSelected()" disabled>Fill with Selected Object</button>
    </div>
  </div>
</div>

<!-- Mobile FABs -->
<button class="mob-fab mob-fab-left" onclick="openDrawer('left')" title="Objects">🌿</button>
<button class="mob-fab mob-fab-right" onclick="openDrawer('right')" title="Sub-plots">☰</button>
<div class="drawer-backdrop" id="drawerBackdrop" onclick="closeDrawer()"></div>

<!-- Name modal -->
<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal">
    <h2>Name this sub-plot</h2>
    <input type="text" id="plotNameInput" placeholder="e.g. Patio, Flower Bed, Lawn…" maxlength="30">
    <div class="modal-row">
      <button class="modal-btn" onclick="cancelPlot()">Cancel</button>
      <button class="modal-btn primary" onclick="confirmPlot()">Add Zone</button>
    </div>
  </div>
</div>

<script>
// ─── Garden object library ────────────────────────────────────────────────────
const OBJECTS = [
  { id: 'lawn',     label: 'Lawn',         color: '#5a9e38', pattern: 'grass'  },
  { id: 'patio',    label: 'Patio',        color: '#9e8e78', pattern: 'stone'  },
  { id: 'gravel',   label: 'Gravel',       color: '#b8aa94', pattern: 'gravel' },
  { id: 'bark',     label: 'Bark Chips',   color: '#7a5230', pattern: 'bark'   },
  { id: 'decking',  label: 'Decking',      color: '#c8904a', pattern: 'deck'   },
  { id: 'slate',    label: 'Slate',        color: '#606878', pattern: 'slate'  },
  { id: 'rose',     label: 'Roses',        color: '#d45080', pattern: 'flower' },
  { id: 'lavender', label: 'Lavender',     color: '#8060c0', pattern: 'flower2'},
  { id: 'veg',      label: 'Veg Bed',      color: '#4a7a30', pattern: 'veg'    },
  { id: 'water',    label: 'Water Feature',color: '#4080c0', pattern: 'water'  },
];

const SUBPLOT_COLORS = [
  '#7ab648','#c8a95a','#d48090','#6090b8','#b090c8',
  '#90c8b8','#c8b090','#9090c8','#c89090','#90b890'
];

// ─── State ───────────────────────────────────────────────────────────────────
let mode = 'draw';
let subplots = [];
let drawingVerts = [];
let selectedSubplot = null;
let selectedObject = null;
let pendingVerts = null;
let hoverPt = null;
let colorIdx = 0;

// ─── Canvas setup ─────────────────────────────────────────────────────────────
const wrap = document.getElementById('canvasWrap');
const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  redraw();
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// ─── Pattern generators ────────────────────────────────────────────────────────
function makePattern(type, color) {
  const sz = 24;
  const pc = document.createElement('canvas');
  pc.width = sz; pc.height = sz;
  const px = pc.getContext('2d');

  switch (type) {
    case 'grass': {
      px.fillStyle = color; px.fillRect(0,0,sz,sz);
      px.strokeStyle = 'rgba(0,0,0,0.18)'; px.lineWidth = 1;
      for (let i = 0; i < 4; i++) {
        const x = 3 + i * 6;
        px.beginPath(); px.moveTo(x, sz);
        px.quadraticCurveTo(x - 2, sz * 0.5, x, 0); px.stroke();
      }
      break;
    }
    case 'stone': {
      px.fillStyle = color; px.fillRect(0,0,sz,sz);
      px.strokeStyle = 'rgba(0,0,0,0.25)'; px.lineWidth = 1;
      px.strokeRect(1, 1, sz*0.6-1, sz*0.5-1);
      px.strokeRect(sz*0.6+1, 1, sz*0.4-2, sz*0.5-1);
      px.strokeRect(1, sz*0.5+1, sz*0.3-1, sz*0.5-2);
      px.strokeRect(sz*0.3+1, sz*0.5+1, sz*0.7-2, sz*0.5-2);
      break;
    }
    case 'gravel': {
      px.fillStyle = color; px.fillRect(0,0,sz,sz);
      const gr = Math.random; // intentional per-render randomness for gravel texture
      for (let i = 0; i < 18; i++) {
        const rx = gr()*sz, ry = gr()*sz, rr = 1+gr()*2;
        px.beginPath();
        px.ellipse(rx, ry, rr, rr*0.7, gr()*Math.PI, 0, Math.PI*2);
        px.fillStyle = `rgba(0,0,0,${0.1+gr()*0.15})`; px.fill();
      }
      break;
    }
    case 'bark': {
      px.fillStyle = color; px.fillRect(0,0,sz,sz);
      px.strokeStyle = 'rgba(0,0,0,0.2)'; px.lineWidth = 1.5;
      for (let i = 0; i < 5; i++) {
        px.beginPath(); px.moveTo(0, i*5+2);
        px.bezierCurveTo(sz*0.3, i*5-2, sz*0.7, i*5+4, sz, i*5+1); px.stroke();
      }
      break;
    }
    case 'flower': {
      px.fillStyle = '#3a6030'; px.fillRect(0,0,sz,sz);
      const cx = sz/2, cy = sz/2;
      for (let p = 0; p < 5; p++) {
        const a = p*(Math.PI*2/5);
        px.beginPath();
        px.ellipse(cx+Math.cos(a)*5, cy+Math.sin(a)*5, 4, 2.5, a, 0, Math.PI*2);
        px.fillStyle = color; px.fill();
      }
      px.beginPath(); px.arc(cx, cy, 2.5, 0, Math.PI*2);
      px.fillStyle = '#f8e050'; px.fill();
      break;
    }
    case 'flower2': {
      px.fillStyle = '#3a5050'; px.fillRect(0,0,sz,sz);
      for (let i = 0; i < 4; i++) {
        const x = 4 + i * 6;
        px.fillStyle = color;
        for (let j = 0; j < 4; j++) {
          px.beginPath(); px.ellipse(x, 18-j*4, 2, 1.5, 0, 0, Math.PI*2); px.fill();
        }
        px.strokeStyle = '#2a4040'; px.lineWidth = 0.8;
        px.beginPath(); px.moveTo(x, sz); px.lineTo(x, 14); px.stroke();
      }
      break;
    }
    case 'veg': {
      px.fillStyle = '#3a5a20'; px.fillRect(0,0,sz,sz);
      px.strokeStyle = 'rgba(0,0,0,0.3)'; px.lineWidth = 1;
      for (let r = 0; r < 4; r++) {
        px.beginPath(); px.moveTo(0, 4+r*6); px.lineTo(sz, 4+r*6); px.stroke();
      }
      px.fillStyle = '#50a030';
      for (let r = 0; r < 3; r++) {
        for (let c = 0; c < 3; c++) {
          px.beginPath(); px.arc(4+c*8, 7+r*6, 2.5, 0, Math.PI*2); px.fill();
        }
      }
      break;
    }
    case 'water': {
      px.fillStyle = color; px.fillRect(0,0,sz,sz);
      px.strokeStyle = 'rgba(255,255,255,0.3)'; px.lineWidth = 1;
      for (let i = 0; i < 4; i++) {
        px.beginPath(); px.moveTo(0, 4+i*6);
        px.quadraticCurveTo(sz*0.5, 4+i*6-3, sz, 4+i*6); px.stroke();
      }
      break;
    }
    case 'deck': {
      px.fillStyle = color; px.fillRect(0,0,sz,sz);
      px.strokeStyle = 'rgba(0,0,0,0.22)'; px.lineWidth = 1.5;
      for (let i = 0; i < 4; i++) {
        px.beginPath(); px.moveTo(0, i*7); px.lineTo(sz, i*7); px.stroke();
      }
      break;
    }
    case 'slate': {
      px.fillStyle = color; px.fillRect(0,0,sz,sz);
      px.strokeStyle = 'rgba(255,255,255,0.12)'; px.lineWidth = 0.8;
      for (let i = 0; i < 6; i++) {
        const x = Math.random()*sz, y = Math.random()*sz;
        px.beginPath(); px.moveTo(x, y);
        px.lineTo(x+8-Math.random()*6, y+5-Math.random()*4); px.stroke();
      }
      break;
    }
  }
  return ctx.createPattern(pc, 'repeat');
}

const patternCache = {};
function getPattern(obj) {
  if (!patternCache[obj.id]) patternCache[obj.id] = makePattern(obj.pattern, obj.color);
  return patternCache[obj.id];
}

// ─── Object library ────────────────────────────────────────────────────────────
function renderObjectList() {
  const el = document.getElementById('objectList');
  el.innerHTML = '';
  OBJECTS.forEach(obj => {
    const div = document.createElement('div');
    div.className = 'object-item' + (selectedObject === obj.id ? ' selected' : '');
    div.onclick = () => selectObject(obj.id);

    const sw = document.createElement('canvas');
    sw.width = 32; sw.height = 32;
    sw.style.cssText = 'border-radius:4px;flex-shrink:0;width:32px;height:32px';
    const sc = sw.getContext('2d');
    const p = makePattern(obj.pattern, obj.color);
    if (p) { sc.fillStyle = p; sc.fillRect(0,0,32,32); }
    else { sc.fillStyle = obj.color; sc.fillRect(0,0,32,32); }

    div.appendChild(sw);
    const lbl = document.createElement('span');
    lbl.className = 'object-label';
    lbl.textContent = obj.label;
    div.appendChild(lbl);
    el.appendChild(div);
  });
}

function selectObject(id) {
  selectedObject = id;
  renderObjectList();
  updateFillBtn();
}

// ─── Mode ─────────────────────────────────────────────────────────────────────
function setMode(m) {
  mode = m;
  drawingVerts = [];
  hoverPt = null;
  document.querySelectorAll('.pill:not(.danger)').forEach(p => p.classList.remove('active'));
  document.getElementById('btn-' + m).classList.add('active');
  canvas.className = m === 'select' ? 'mode-select' : '';
  updateHint();
  redraw();
}

function updateHint() {
  const h = document.getElementById('hint');
  if (mode === 'draw') {
    if (drawingVerts.length === 0) h.textContent = 'Click to start placing vertices';
    else if (drawingVerts.length === 1) h.textContent = 'Click to add more vertices';
    else if (drawingVerts.length === 2) h.textContent = 'Need at least one more vertex';
    else h.textContent = 'Double-click or click the first point to close';
  } else {
    h.textContent = 'Click a sub-plot to select it';
  }
}

// ─── Subplot list ──────────────────────────────────────────────────────────────
function renderSubplotList() {
  const el = document.getElementById('subplotList');
  if (subplots.length === 0) {
    el.innerHTML = '<div class="empty-state">Draw a zone on the canvas to create your first sub-plot.</div>';
    return;
  }
  el.innerHTML = '';
  [...subplots].reverse().forEach((sp, ri) => {
    const i = subplots.length - 1 - ri;
    const div = document.createElement('div');
    div.className = 'subplot-item' + (selectedSubplot === i ? ' active' : '');
    div.onclick = e => { if (!e.target.closest('.subplot-actions')) selectSubplot(i); };

    const dot = document.createElement('div');
    dot.className = 'subplot-color-dot';
    dot.style.background = sp.color;

    const zbadge = document.createElement('span');
    zbadge.className = 'z-badge';
    zbadge.textContent = `z${i+1}`;

    const info = document.createElement('div');
    info.className = 'subplot-info';

    const name = document.createElement('div');
    name.className = 'subplot-name';
    name.textContent = sp.name;

    const meta = document.createElement('div');
    meta.className = 'subplot-meta';
    const fillObj = OBJECTS.find(o => o.id === sp.fill);
    meta.textContent = fillObj ? `Filled: ${fillObj.label}` : 'No fill';

    info.appendChild(name);
    info.appendChild(meta);

    const acts = document.createElement('div');
    acts.className = 'subplot-actions';

    const upBtn = document.createElement('button');
    upBtn.className = 'icon-btn up'; upBtn.title = 'Move up'; upBtn.innerHTML = '↑';
    upBtn.onclick = e => { e.stopPropagation(); moveSubplot(i, 1); };

    const dnBtn = document.createElement('button');
    dnBtn.className = 'icon-btn dn'; dnBtn.title = 'Move down'; dnBtn.innerHTML = '↓';
    dnBtn.onclick = e => { e.stopPropagation(); moveSubplot(i, -1); };

    const delBtn = document.createElement('button');
    delBtn.className = 'icon-btn'; delBtn.title = 'Delete'; delBtn.innerHTML = '✕';
    delBtn.onclick = e => { e.stopPropagation(); deleteSubplot(i); };

    acts.appendChild(upBtn); acts.appendChild(dnBtn); acts.appendChild(delBtn);
    div.appendChild(dot); div.appendChild(zbadge); div.appendChild(info); div.appendChild(acts);
    el.appendChild(div);
  });
}

function selectSubplot(i) {
  selectedSubplot = i;
  renderSubplotList();
  updateFillBtn();
  redraw();
}

function moveSubplot(i, dir) {
  const ni = i + dir;
  if (ni < 0 || ni >= subplots.length) return;
  [subplots[i], subplots[ni]] = [subplots[ni], subplots[i]];
  if (selectedSubplot === i) selectedSubplot = ni;
  renderSubplotList(); redraw();
}

function deleteSubplot(i) {
  subplots.splice(i, 1);
  if (selectedSubplot === i) selectedSubplot = null;
  else if (selectedSubplot > i) selectedSubplot--;
  renderSubplotList(); updateFillBtn(); redraw();
}

function updateFillBtn() {
  document.getElementById('fillBtn').disabled = !(selectedSubplot !== null && selectedObject !== null);
}

// ─── Drawing ───────────────────────────────────────────────────────────────────
function ptNear(a, b, tol = 14) {
  return Math.abs(a.x - b.x) < tol && Math.abs(a.y - b.y) < tol;
}

function getCanvasPt(e) {
  const r = canvas.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return {
    x: Math.max(0, Math.min(canvas.width,  src.clientX - r.left)),
    y: Math.max(0, Math.min(canvas.height, src.clientY - r.top)),
  };
}

canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  hoverPt = {
    x: Math.max(0, Math.min(canvas.width,  e.clientX - r.left)),
    y: Math.max(0, Math.min(canvas.height, e.clientY - r.top)),
    clamped: false,
  };
  if (mode === 'draw' && drawingVerts.length > 0) redraw();
});

canvas.addEventListener('mouseleave', e => {
  if (mode === 'draw' && drawingVerts.length > 0 && hoverPt) {
    const r = canvas.getBoundingClientRect();
    hoverPt = {
      x: Math.max(0, Math.min(canvas.width,  e.clientX - r.left)),
      y: Math.max(0, Math.min(canvas.height, e.clientY - r.top)),
      clamped: true,
    };
    redraw();
  } else {
    hoverPt = null;
    if (mode === 'draw') redraw();
  }
});

canvas.addEventListener('click', e => {
  const pt = getCanvasPt(e);
  if (mode === 'draw') {
    if (drawingVerts.length >= 3 && ptNear(pt, drawingVerts[0])) { closePoly(); return; }
    drawingVerts.push(pt);
    updateHint(); redraw();
  } else if (mode === 'select') {
    let hit = null;
    for (let i = subplots.length - 1; i >= 0; i--) {
      if (pointInPoly(pt, subplots[i].verts)) { hit = i; break; }
    }
    selectedSubplot = hit;
    renderSubplotList(); updateFillBtn(); redraw();
  }
});

canvas.addEventListener('dblclick', e => {
  if (mode === 'draw' && drawingVerts.length >= 3) {
    drawingVerts.pop(); // remove the extra click from dblclick
    closePoly();
  }
});

// Touch support
let lastTap = 0;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const now = Date.now();
  const pt = getCanvasPt(e);
  if (mode === 'draw') {
    if (now - lastTap < 300 && drawingVerts.length >= 3) {
      drawingVerts.pop();
      closePoly();
    } else {
      if (drawingVerts.length >= 3 && ptNear(pt, drawingVerts[0])) { closePoly(); return; }
      drawingVerts.push(pt);
      updateHint(); redraw();
    }
  } else if (mode === 'select') {
    let hit = null;
    for (let i = subplots.length - 1; i >= 0; i--) {
      if (pointInPoly(pt, subplots[i].verts)) { hit = i; break; }
    }
    selectedSubplot = hit;
    renderSubplotList(); updateFillBtn(); redraw();
  }
  lastTap = now;
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (mode === 'draw' && drawingVerts.length > 0) {
    hoverPt = { ...getCanvasPt(e), clamped: false };
    redraw();
  }
}, { passive: false });

function pointInPoly(pt, verts) {
  let inside = false;
  for (let i = 0, j = verts.length - 1; i < verts.length; j = i++) {
    const xi = verts[i].x, yi = verts[i].y, xj = verts[j].x, yj = verts[j].y;
    if (((yi > pt.y) !== (yj > pt.y)) && (pt.x < (xj-xi)*(pt.y-yi)/(yj-yi)+xi)) inside = !inside;
  }
  return inside;
}

function closePoly() {
  if (drawingVerts.length < 3) return;
  pendingVerts = [...drawingVerts];
  drawingVerts = [];
  hoverPt = null;
  showModal();
}

// ─── Modal ─────────────────────────────────────────────────────────────────────
function showModal() {
  const inp = document.getElementById('plotNameInput');
  inp.value = '';
  document.getElementById('modalBackdrop').classList.add('visible');
  setTimeout(() => inp.focus(), 60);
}

document.getElementById('plotNameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') confirmPlot();
  if (e.key === 'Escape') cancelPlot();
});

function confirmPlot() {
  const name = document.getElementById('plotNameInput').value.trim() || 'Zone';
  const color = SUBPLOT_COLORS[colorIdx % SUBPLOT_COLORS.length];
  colorIdx++;
  subplots.push({ name, verts: pendingVerts, color, fill: null });
  pendingVerts = null;
  document.getElementById('modalBackdrop').classList.remove('visible');
  renderSubplotList(); redraw(); updateHint();
}

function cancelPlot() {
  pendingVerts = null;
  document.getElementById('modalBackdrop').classList.remove('visible');
  redraw(); updateHint();
}

// ─── Fill ─────────────────────────────────────────────────────────────────────
function fillSelected() {
  if (selectedSubplot === null || selectedObject === null) return;
  subplots[selectedSubplot].fill = selectedObject;
  renderSubplotList(); redraw();
}

function updateTileVal() {
  document.getElementById('tileSizeVal').textContent = document.getElementById('tileSize').value + 'px';
  redraw();
}
function updateRandVal() {
  document.getElementById('randVal').textContent = document.getElementById('randAmount').value + '%';
  redraw();
}

// ─── Rendering ────────────────────────────────────────────────────────────────
function drawPolyPath(verts) {
  ctx.beginPath();
  ctx.moveTo(verts[0].x, verts[0].y);
  for (let i = 1; i < verts.length; i++) ctx.lineTo(verts[i].x, verts[i].y);
  ctx.closePath();
}

function fillSubplot(sp) {
  if (!sp.fill) return;
  const obj = OBJECTS.find(o => o.id === sp.fill);
  if (!obj) return;

  const tileSize = parseInt(document.getElementById('tileSize').value);
  const rand = parseInt(document.getElementById('randAmount').value) / 100;
  const xs = sp.verts.map(v => v.x), ys = sp.verts.map(v => v.y);
  const minX = Math.min(...xs) - tileSize, maxX = Math.max(...xs) + tileSize;
  const minY = Math.min(...ys) - tileSize, maxY = Math.max(...ys) + tileSize;

  ctx.save();
  drawPolyPath(sp.verts);
  ctx.clip();

  // stable seeded random per subplot
  let rngState = sp.name.split('').reduce((a,c) => a + c.charCodeAt(0), 0);
  function seededRand() {
    rngState = (rngState * 1664525 + 1013904223) & 0xffffffff;
    return (rngState >>> 0) / 0xffffffff;
  }

  for (let x = minX; x < maxX; x += tileSize) {
    for (let y = minY; y < maxY; y += tileSize) {
      const jx = (seededRand() - 0.5) * tileSize * rand * 0.4;
      const jy = (seededRand() - 0.5) * tileSize * rand * 0.4;
      const rot = (seededRand() - 0.5) * rand * 0.5;
      const scale = 1 + (seededRand() - 0.5) * rand * 0.3;
      const cx2 = x + tileSize/2 + jx, cy2 = y + tileSize/2 + jy;

      ctx.save();
      ctx.translate(cx2, cy2);
      ctx.rotate(rot);
      ctx.scale(scale, scale);

      const tmpC = document.createElement('canvas');
      tmpC.width = tileSize; tmpC.height = tileSize;
      const tc = tmpC.getContext('2d');
      tc.fillStyle = makePattern(obj.pattern, obj.color);
      tc.fillRect(0, 0, tileSize, tileSize);
      ctx.drawImage(tmpC, -tileSize/2, -tileSize/2, tileSize, tileSize);
      ctx.restore();
    }
  }
  ctx.restore();
}

function redraw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Grid
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  for (let x = 0; x < canvas.width; x += 40) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
  }
  for (let y = 0; y < canvas.height; y += 40) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
  }

  // Completed subplots
  subplots.forEach((sp, i) => {
    fillSubplot(sp);
    drawPolyPath(sp.verts);
    ctx.fillStyle = sp.fill ? 'rgba(0,0,0,0.1)' : hexToRgba(sp.color, 0.25);
    ctx.fill();

    ctx.strokeStyle = i === selectedSubplot ? '#e8f0e4' : sp.color;
    ctx.lineWidth = i === selectedSubplot ? 2.5 : 1.5;
    drawPolyPath(sp.verts);
    ctx.stroke();

    // Label
    const cx2 = sp.verts.reduce((s,v) => s+v.x, 0) / sp.verts.length;
    const cy2 = sp.verts.reduce((s,v) => s+v.y, 0) / sp.verts.length;
    ctx.fillStyle = 'rgba(232,240,228,0.9)';
    ctx.font = '500 11px DM Sans, system-ui, sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(sp.name, cx2, cy2);
  });

  // In-progress polygon
  if (drawingVerts.length > 0) {
    ctx.save();
    const activeColor = SUBPLOT_COLORS[colorIdx % SUBPLOT_COLORS.length];

    // Rubber-band line
    ctx.strokeStyle = activeColor;
    ctx.lineWidth = 2;
    ctx.setLineDash([6, 3]);
    ctx.beginPath();
    ctx.moveTo(drawingVerts[0].x, drawingVerts[0].y);
    drawingVerts.forEach(v => ctx.lineTo(v.x, v.y));
    if (hoverPt) ctx.lineTo(hoverPt.x, hoverPt.y);
    ctx.stroke();
    ctx.setLineDash([]);

    // Vertex dots
    drawingVerts.forEach((v, i) => {
      ctx.beginPath();
      ctx.arc(v.x, v.y, i === 0 ? 7 : 4, 0, Math.PI*2);
      ctx.fillStyle = i === 0 ? '#e8f0e4' : activeColor;
      ctx.fill();
      if (i === 0 && hoverPt && ptNear(hoverPt, v) && drawingVerts.length >= 3) {
        ctx.beginPath(); ctx.arc(v.x, v.y, 13, 0, Math.PI*2);
        ctx.strokeStyle = 'rgba(232,240,228,0.5)'; ctx.lineWidth = 2; ctx.stroke();
      }
    });
    ctx.restore();
  }
}

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function clearAll() {
  if (subplots.length === 0 && drawingVerts.length === 0) return;
  if (!confirm('Clear all sub-plots?')) return;
  subplots = []; drawingVerts = []; selectedSubplot = null; colorIdx = 0;
  renderSubplotList(); updateFillBtn(); redraw(); updateHint();
}

// ─── Mobile drawers ────────────────────────────────────────────────────────────
function openDrawer(side) {
  closeDrawer();
  if (side === 'left')  document.getElementById('leftPanel').classList.add('drawer-open');
  if (side === 'right') document.getElementById('rightPanel').classList.add('drawer-open');
  document.getElementById('drawerBackdrop').classList.add('open');
}
function closeDrawer() {
  document.getElementById('leftPanel').classList.remove('drawer-open');
  document.getElementById('rightPanel').classList.remove('drawer-open');
  document.getElementById('drawerBackdrop').classList.remove('open');
}

// ─── Init ─────────────────────────────────────────────────────────────────────
renderObjectList();
renderSubplotList();
updateHint();
</script>
</body>
</html>
